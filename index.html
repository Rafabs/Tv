<!DOCTYPE html>
<html>
<head>
  <title>Programação</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="icon" type="image/png" href="imgs//favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div id="weather" class="weather-card">
    <div id="date-time"></div>    
    <div id="temperature"></div>
    <div id="location"></div>
    <div id="weather-icon"></div>
  </div>

  <div class="container">
    <h1>Lab+ TV</h1>
    
      <div id="banner" class="banner">
        <div class="slide">
          <img src="imgs//sintonia.jpg" alt="Imagem 1">
          <div class="film-name">Sintonia</div>
        </div>
        
        <div class="slide">
          <img src="imgs//invasao-secreta.jpg" alt="Imagem 2">
          <div class="film-name">Invasão Secreta</div>
        </div>

        <div class="slide">
          <img src="imgs//the-witcher.jpg" alt="Imagem 3">
          <div class="film-name">The Witcher</div>
        </div>       
      </div>
      <div class="controls">
        <button class="prev-button">&lt;</button>
        <button class="next-button">&gt;</button>
      </div>
  </div>
    
    <div class="dates-container">

      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '27/07')">27/07 Qui</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '28/07')">28/07 Sex</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '29/07')">29/07 Sáb</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '30/07')">30/07 Dom</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '31/07')">31/07 Seg</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '01/08')">01/08 Ter</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '02/08')">02/08 Qua</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '03/08')">03/08 Qui</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '04/08')">04/08 Sex</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '05/08')">05/08 Sáb</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '06/08')">06/08 Dom</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '07/08')">07/08 Seg</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '08/08')">08/08 Ter</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '09/08')">09/08 Qua</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '10/08')">10/08 Qui</button>
      <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '11/08')">11/08 Sex</button>
      <button class="embreve" type="button" tabindex="0" onclick="mostrarProgramacao(this, 'em-breve')">EM BREVE</button>
    </div>
    
    <div id="programacao"></div>
  </div>

  <script src="script.js"></script>

  <footer>
    <p>Desenvolvido por Rafael Barbosa - 2023</p>
  </footer>

</body>
</html>
