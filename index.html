<!DOCTYPE html>
<html>

<head>
  <title>Programação</title>
  <link rel="stylesheet" type="text/css" href="styles.css">

  <!--FONT AWESOME-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <!--GOOGLE FONTS-->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Play&display=swap" rel="stylesheet">

</head>
<link rel="icon" type="image/png" href="imgs//favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">
    <h1>Lab+ TV</h1>

    <div class="slide">
      <img src="imgs//capa.jpg" alt="Imagem 1">
      <div class="film-name">Estréia</div>
    </div>
  </div>

  <div class="dates-container">
   
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '26/05')"> 26/05 Seg</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '27/05')"> 27/05 Ter</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '28/05')"> 28/05 Qua</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '30/05')"> 30/05 Sex</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '31/05')"> 31/05 Sáb</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '01/06')"> 01/06 Dom</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '02/06')"> 02/06 Seg</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '04/06')"> 04/06 Qua</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '05/06')"> 05/06 Qui</button>
    <button class="button" type="button" tabindex="0" onclick="mostrarProgramacao(this, '06/06')"> 06/06 Sex</button>

    <button class="embreve" type="button" tabindex="0" onclick="mostrarProgramacao(this, 'em-breve')">EM BREVE</button>

  </div>

  <div id="programacao"></div>
  </div>

  <script src="script.js"></script>

  <footer id="footer">
    <div id="weather" class="weather-card">
      <div id="date-time"></div>
      <div id="temperature"></div>
      <div id="weather-icon"></div>
      <div id="USD" name="mercado_cotacao">$</div>
      <script async src="https://mercadocotacao.com/money/mercadocotacao.js"></script>
      <div id="EUR" name="mercado_cotacao">€</div>
      <script async src="https://mercadocotacao.com/money/mercadocotacao.js"></script>
    </div>

    <div class="footer">
      <div class="row">
        <a href="#"><i class="fa fa-facebook"></i></a>
        <a href="#"><i class="fa fa-instagram"></i></a>
        <a href="#"><i class="fa fa-youtube"></i></a>
        <a href="#"><i class="fa fa-twitter"></i></a>
      </div>

      <div class="row">
        <ul>
          <li><a href="#">Fale Conosco</a></li>
          <li><a href="#">Nossos Serviços</a></li>
          <li><a href="#">Política de Privacidade</a></li>
          <li><a href="#">Termos e Condições</a></li>
          <li><a href="#">Trabalhe Conosco</a></li>
        </ul>
      </div>

      <div class="row">
        Lab+ TV Copyright © 2023 - All rights reserved || Designed By: Rafael Barbosa
      </div>
    </div>
  </footer>

</body>

</html>
